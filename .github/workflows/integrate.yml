name: Integrate
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: holepunchto/actions/node-base@v1
      - run: npm run lint
  apple:
    strategy:
      matrix:
        include:
          - os: macos-26-intel
            platform: darwin
            arch: x64
          - os: macos-26
            platform: darwin
            arch: arm64
          - os: macos-26
            platform: ios
            arch: arm64
          - os: macos-26
            platform: ios
            arch: arm64
            tags: -simulator
            flags: --simulator
          - os: macos-26
            platform: ios
            arch: x64
            tags: -simulator
            flags: --simulator
    runs-on: ${{ matrix.os }}
    name: Test / ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - uses: actions/cache@v5
        with:
          path: build/_drive
          key: corestore-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}
      - run: npm install --global bare-make
      - run: npm install
      - run: bare-make generate --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ matrix.flags }} --debug
      - run: bare-make build
      - run: bare-make test
        if: ${{ matrix.platform == 'darwin' }}
  android:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform: android
    runs-on: ${{ matrix.os }}
    name: Test / ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/cache@v5
        with:
          path: android/build/_drive
          key: corestore-${{ matrix.platform }}
      - run: npm install --global cmake-runtime ninja-runtime
      - run: npm install
      - run: gradle aR
  linux:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
    runs-on: ${{ matrix.os }}
    name: Test / ${{ matrix.platform }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - uses: actions/cache@v5
        with:
          path: build/_drive
          key: corestore-${{ matrix.platform }}-${{ matrix.arch }}
      - run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
        if: ${{ matrix.platform == 'linux' }}
      - run: npm install --global bare-make
      - run: npm install
      - run: bare-make generate --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --debug
      - run: bare-make build
      - run: bare-make test
  windows:
    strategy:
      matrix:
        include:
          - os: windows-2022
            platform: win32
            arch: x64
          - os: windows-11-arm
            platform: win32
            arch: arm64
    runs-on: ${{ matrix.os }}
    name: Test / ${{ matrix.platform }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - uses: actions/cache@v5
        with:
          path: build/_drive
          key: corestore-${{ matrix.platform }}-${{ matrix.arch }}
      - run: choco upgrade llvm
      - run: choco install nasm
      - run: npm install --global bare-make
      - run: npm install
      - run: bare-make generate --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --debug
      - run: bare-make build
      - run: bare-make test
